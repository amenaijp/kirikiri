# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: kirikiri

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: kirikiri
            use_cross: true

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: kirikiri.exe

          - target: aarch64-pc-windows-msvc
            os: windows-latest
            binary: kirikiri.exe

          - target: aarch64-apple-darwin
            os: macos-14        # macos-14 runners are native Apple Silicon
            binary: kirikiri

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build
        shell: bash
        run: |
          ${{ matrix.use_cross && 'cross' || 'cargo' }} build \
            --release --target ${{ matrix.target }}

      # Rename with target suffix before stashing as an artifact
      - name: Stage binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          ext="${{ matrix.binary == 'kirikiri.exe' && '.exe' || '' }}"
          cp "$src" "kirikiri-${{ matrix.target }}${ext}"

      - uses: actions/upload-artifact@v4
        with:
          name: kirikiri-${{ matrix.target }}
          path: kirikiri-${{ matrix.target }}*   # matches with or without .exe

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true   # flattens all artifact dirs into one

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*